services:
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb,sqs,lambda,sns,iam,logs,sts
    volumes:
      - localstack-data:/var/lib/localstack

  console:
    build: .
    ports:
      - "3000:3000"
    environment:
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
    depends_on:
      - localstack

volumes:
  localstack-data:
